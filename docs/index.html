<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TireBot — Whitepaper</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5/github-markdown-light.min.css">
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <style>
    body { margin: 0; background: #f6f8fa; }
    .wrap { max-width: 920px; margin: 0 auto; padding: 1.5rem 1.25rem 3rem; }
    .banner {
      font-family: system-ui, sans-serif;
      font-size: 0.875rem;
      color: #57606a;
      margin-bottom: 1rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid #d0d7de;
    }
    .banner a { color: #0969da; }
    #content.markdown-body { min-height: 40vh; }
    .err { font-family: system-ui, sans-serif; color: #cf222e; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="banner">
      <strong>TireBot</strong> methodology &amp; assumptions.
      <a href="https://github.com/jaredverbeke/TireBot">Repository</a>
      ·
      <a href="https://github.com/jaredverbeke/TireBot/blob/main/docs/WHITEPAPER.md">View / edit on GitHub</a>
    </div>
    <article id="content" class="markdown-body">Loading whitepaper…</article>
  </div>
  <script>
    const gh =
      "https://github.com/jaredverbeke/TireBot/blob/main/docs/WHITEPAPER.md";
    fetch("WHITEPAPER.md")
      .then(function (r) {
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.text();
      })
      .then(function (text) {
        document.getElementById("content").innerHTML = marked.parse(text);
      })
      .catch(function () {
        document.getElementById("content").innerHTML =
          '<p class="err">Could not load <code>WHITEPAPER.md</code> from this site.</p>' +
          "<p>Open the whitepaper on GitHub instead: " +
          '<a href="' + gh + '">' + gh + "</a></p>";
      });
  </script>
</body>
</html>
